version: '3.8'

services:
  # Service MySQL
  mysql:
    image: mysql:8.0
    container_name: e_bank_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"  # 🔥 Port 3307 sur l'hôte vers 3306 dans le conteneur
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Service Backend (Spring Boot)
  backend:
    build: ./backend
    container_name: e_bank_backend
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure

  # Service Frontend (Angular)
  frontend:
    build: ./frontend
    container_name: e_bank_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - ANGULAR_API_URL=${ANGULAR_API_URL}
    depends_on:
      - backend
    networks:
      - app-network
    restart: on-failure

# Volumes persistants
volumes:
  mysql_data:

# Réseau
networks:
  app-network:
    driver: bridge